<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba Element Form di dalam Table</title>
</head>
<body>

    <h1>Contoh elemen-elemen form pada HTML</h1>

   <form action="">

      <table cellpadding="4">
        <tr>
         <td align="right"> <label for="nama">Nama:</label></td>
         <td><input type="text" name="nama" placeholder="Masukkan nama" id="nama"></td>
        </tr>
        <tr>
         <td align="right"> <label>Nama:</label></td>
         <td> <input type="text" name="nama"></td>
        </tr>
        <tr>
         <td align="right"><label for="nama">Nama:</label></td>
         <td> <input type="text" name="nama" id="nama"></td>
        </tr>
        <tr>
         <td align="right"><label for="password">Password:</label></td>
         <td> <input type="password" name="password" id="password" placeholder="Masukkan password"></td>
        </tr>
        <tr>
     
         <td align="right"><label for="email">Email:</label></td>
         <td><input type="email" name="email" id="email"></td>
        </tr>
        <tr>
         <td align="right"><label for="number">Angka:</label></td>
         <td><input type="number" name="number" id="number"></td>
        </tr>
        <tr>
         <td align="right"><label for="number">Angka:</label></td>
         <td> <input type="number" name="number" id="number" min="0" max="100"></td>
        </tr>
        <tr>
         <td align="right"><label for="number">Angka:</label></td>
         <td> <input type="number" name="number" id="number" min="0" max="100" step="5"></td>
        </tr>
        <tr>
         <td align="right"><label for="tanggal">Tanggal:</label></td>
         <td><input type="date" name="tanggal" id="tanggal" ></td>
        </tr>
        <tr>
         <td align="right"><label for="warna">Pilih warna:</label></td>
         <td><input type="color" name="warna" id="warna" ></td>
        </tr>
        <tr>
         <td colspan="2"><button>Submit!</button></td>
         <td></td>
        </tr>
        <tr>
         <td><button type="submit">Kirim!</button></td>
         <td></td>
        </tr>
      </table>

   </form>       
        
</body>
</html>
