<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select & textarea</title>
</head>
<body>

    <form>
    <h3>Pilih Kota:</h3>
    <!-- syarat: select harus menggunakan name dan option harus mneggunakan value -->
    <select name="kota" id="kota">
        <option value="">-- Pilih salah satu --</option>
        <option value="bdg">Bandung</option>
        <option value="jkt">Jakarta</option>
        <option value="bgr">Bogor</option>
        <option value="sby">Surabaya</option>
        <option value="mdn">Medan</option>
    </select>
    <br>

    <h3>About me:</h3>

    <textarea name="about" id="about" cols="100" rows="50" placeholder="Isi data anda disini:"></textarea>

    <br><br>
    <button type="submit">Kirim!</button>
    </form>
    
   
    
</body>
</html>
