<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba Text - Text Overflow & Text Shadow</title>
    <style>
        p {
            font-size: 26px;
            white-space: nowrap;
            width: 300px;
            background-color: lightblue;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        h1 {
            font-size: 100px;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            text-shadow: 5px 5px 0 gray;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: lightblue;
            text-decoration-skip-ink: none;
        }
    </style>
</head>
<body>
    <h1>Hello, CSS!</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ut molestias recusandae nostrum asperiores tempora! Officiis, odio accusamus aliquam, molestias quibusdam itaque soluta temporibus nostrum tempore natus consectetur beatae laboriosam? Sint!</p>
   
</body>
</html>
