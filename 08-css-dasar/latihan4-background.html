<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #f8f8ff;
            text-align: center;
            background-color: #0f172a;
            background-image: linear-gradient(to bottom, rgb(15 23 42 / 90%) 50%,  rgb(15 23 42 / 40%)), url('https://picsum.photos/id/10/1000/1000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        h1{
            font-size: 4em;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 10px;
            text-decoration: none;
            /* text-decoration-style: wavy;
            text-decoration-color: #374460; */
            /* text-shadow: 5px 5px 0 rgb(215 215 215 / 10%); */
            background-image: linear-gradient(to right, rgb(59, 160, 233), rgb(238, 80, 233));
            /* color: #38baf4; */
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 10px rgb(121 228 252 / 60%));
            
        }
        .quote {
            font-size: 22px;
            line-height: 2.2;
            word-spacing: 5px;
            background-color: rgb(255 255 255 / 5%);
            max-width: 600px;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgb(255 255 255 / 10%);
            box-shadow: 0 10px 30px rgb(0 0 0 / 50%);
        }

        span {
            color: crimson;
            /* text-decoration: line-through; */
            text-decoration: none;
            text-shadow: 0 0 10px rgb(248 50 89);
        }
        .credit {
            font-size: 12px;
            letter-spacing: 2px;
            color: rgb(151 151 151 / 70%);
            font-weight: normal;
            text-transform: uppercase;
            border-top: 1px solid rgb(255 255 255 / 20%);
            width: 30%;
            margin: 30px auto;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <h1>fase runtuh</h1>
    
        <p class="quote">"Tak perlu khawatir, ku hanya <span>terluka</span>
        <br>
        Terbiasa tuk pura-pura tertawa.
        <br>
        Namun bolehkah sekali saja ku menangis? 
        <br>
        Sebelum kembali membohongi diri."</p>

        <p class="credit">— feby putri feat. fiersa besari</p>
    
</body>
</html>
